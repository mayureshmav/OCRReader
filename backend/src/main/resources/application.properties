# ── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ── H2 In-memory Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:ocrreader;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable OSIV — we control transactions explicitly in services.
# With OSIV=true, Hibernate keeps a session open for the whole HTTP request
# which can silently trigger lazy loads in unexpected places.
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Multipart (file upload) ───────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Jackson JSON ──────────────────────────────────────────────────────────────
# Handled via JacksonConfig @Bean to avoid property binding conflicts

# ── Tesseract ─────────────────────────────────────────────────────────────────
# Update this path to match your local Tesseract installation:
#   Mac Homebrew (Intel):   /usr/local/share/tessdata
#   Mac Homebrew (M-series):/opt/homebrew/share/tessdata
#   Ubuntu/Debian:          /usr/share/tesseract-ocr/4.00/tessdata
ocr.tesseract.data-path=/opt/homebrew/share/tessdata
ocr.tesseract.default-language=eng
ocr.tesseract.ocr-engine-mode=3
ocr.tesseract.confidence-threshold=70

# ── OCR Processing ───────────────────────────────────────────────────────────
ocr.processing.temp-dir=${java.io.tmpdir}/ocr-reader
ocr.processing.enable-duplicate-detection=true
ocr.processing.enable-auto-classification=true
ocr.processing.mandatory-fields=invoiceNumber,invoiceDate,vendorName,grandTotal

# ── SFTP defaults (overridden at runtime via Integration screen) ──────────────
ocr.sftp.enabled=false
ocr.sftp.host=
ocr.sftp.port=22
ocr.sftp.username=
ocr.sftp.password=
ocr.sftp.remote-path=/invoices/incoming
ocr.sftp.processed-path=/invoices/processed
ocr.sftp.failed-path=/invoices/failed
ocr.sftp.poll-interval-seconds=60

# ── Email / IMAP defaults (overridden at runtime via Integration screen) ──────
ocr.email.enabled=false
ocr.email.imap-host=
ocr.email.imap-port=993
ocr.email.username=
ocr.email.password=
ocr.email.mailbox=INBOX
ocr.email.poll-interval-seconds=120

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.ocrreader=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
